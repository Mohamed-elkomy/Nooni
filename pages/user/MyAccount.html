<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Meta tags for character set and viewport settings -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>nooni</title>
    <!-- Bootstrap CSS for styling -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />

    <!-- Animate.css for animations -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
    <!-- Global and page-specific styles -->
    <link rel="stylesheet" href="//assets/styles/global.css" />
    <link rel="stylesheet" href="//assets/styles/user/MyAccount.css" />
  </head>
  <body class=" d-flex flex-column">
    <!-- top header start -->
    <div
      class="bg-black d-flex justify-content-between align-items-center text-white p-2"
    >
      <div class="header-text">
        <h2 class="fs-6">
          Up to 40% off Best-Selling Furniture.
          <a href="../Shop/ShopGrid.html" class="text-white"> Shop Now</a>
        </h2>
      </div>
      <div class="d-flex g-1">
        <select id="myDropdown" class="bg-black border-black text-white-50">
          <option value="option1">English</option>
          <option value="option2">Arabic</option>
          <option value="option2">French</option>
        </select>
        <select id="myDropdown" class="bg-black border-black text-white-50">
          <option value="option1">USD</option>
          <option value="option2">EUR</option>
        </select>
      </div>
    </div>
    <!-- top header end -->
    <!-- Header section with navigation menu -->
    <!-- header start  -->
    <header
      class="d-flex align-items-center gap-3 col-12 text-white p-3 container"
    >
      <!-- offcanvas start -->
      <div>
        <img
          src="//assets/imgs/Home/burger-bar.png"
          width="30px"
          class="d-block"
          data-bs-toggle="offcanvas"
          href="#offcanvasExample"
          role="button"
          aria-controls="offcanvasExample"
          alt=""
        />
        <div
          class="offcanvas offcanvas-start"
          tabindex="-1"
          id="offcanvasExample"
          aria-labelledby="offcanvasExampleLabel"
        >
          <nav class="d-flex flex-column align-items-center col-12 gap-3">
            <!-- Navigation links -->
            <a href="//index.html">Home</a>
            <a href="//pages/Shop/ShopGrid.html">Shop</a>
            <a href="//pages/Product/Product-1.html">Product</a>
            <a href="//pages/Blog/BlogDefault.html">Blog </a>
            <a href="//pages/About/AboutUs.html">About Us</a>
            <a href="//pages/Contact/ContactUs.html">Contact Us</a>
          </nav>
        </div>
      </div>
      <!-- offcanvas end -->
      <button
        class="d-block col-1 d-flex flex-wrap border-0"
        type="button"
        data-bs-toggle="offcanvas"
        data-bs-target="#offcanvasRight"
        aria-controls="offcanvasRight"
        style="background-color: #fff"
      >
        <img
          class="d-flex flex-wrap col-3"
          src="//assets/imgs/Home/search.png"
          alt=""
        />
      </button>

      <div
        class="offcanvas offcanvas-end"
        tabindex="-1"
        id="offcanvasRight"
        aria-labelledby="offcanvasRightLabel"
      >
        <div class="offcanvas-header">
          <h5 class="offcanvas-title" id="offcanvasRightLabel">
            Search for products (0)
          </h5>
          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="offcanvas"
            aria-label="Close"
          ></button>
        </div>
        <div class="offcanvas-body">
          <div class="input-group">
            <input
              type="text"
              class="form-control"
              placeholder="Search for products"
            />
            <span class="input-group-text">
              <img
                class="search-icon"
                src="//assets/imgs/Home/search.png"
                alt="Search Icon"
              />
            </span>
          </div>
        </div>
      </div>
      <button
        class="col-1 d-flex flex-wrap border-0"
        style="background-color: #fff"
      ></button>
      <div
        class="container d-flex flex-wrap justify-content-around align-text-center gap-2"
      >
        <img class="col-5" src="//assets/imgs/Home/logo.png" alt="" />
      </div>
      <button
        class="col-1 d-flex flex-wrap border-0"
        style="background-color: #fff"
      >
        <img
          class="d-flex flex-wrap col-5"
          src="//assets/imgs/Home/user-avatar.png"
          alt=""
        />
      </button>
      <button
        class="col-1 d-flex flex-wrap border-0"
        style="background-color: #fff"
      >
        <img
          class="d-flex flex-wrap col-5"
          src="//assets/imgs/Home/wishlist.png"
          alt=""
        />
      </button>
      <button
        class="col-1 d-flex flex-wrap border-0"
        style="background-color: #fff"
      >
        <img class="col-5" src="//assets/imgs/Home/shopping-cart.png" alt="" />
      </button>
    </header>
    <!-- header end  -->
    <!-- section one start -->
    <div class="container mt-5">
      <div class="row">
        <div class="col-md-6">
          <h2>Login</h2>
          <form>
            <div class="form-group">
              <label for="username">Username or email address *</label>
              <input
                type="text"
                class="form-control"
                id="username"
                placeholder="Username or email address"
              />
            </div>
            <div class="form-group">
              <label for="password">Password *</label>
              <input
                type="password"
                class="form-control"
                id="password"
                placeholder="Password"
              />
            </div>
            <div class="form-group form-check">
              <input
                type="checkbox"
                class="form-check-input"
                id="remember-me"
              />
              <label class="form-check-label" for="remember-me"
                >Remember me</label
              >
            </div>
            <button type="submit" class="btn btn-dark">Log In</button>
            <p class="mt-2"><a href="#">Lost your password?</a></p>
          </form>
        </div>
        <div class="col-md-6">
          <h2>Register</h2>
          <form>
            <div class="form-group">
              <label for="username">Username *</label>
              <input
                type="text"
                class="form-control"
                id="username"
                placeholder="Username"
              />
            </div>
            <div class="form-group">
              <label for="email">Email address *</label>
              <input
                type="email"
                class="form-control"
                id="email"
                placeholder="Email address"
              />
            </div>
            <div class="form-group">
              <label for="password">Password *</label>
              <input
                type="password"
                class="form-control"
                id="password"
                placeholder="Password"
              />
            </div>
            <button type="submit" class="btn btn-primary">Register</button>
          </form>
        </div>
      </div>
    </div>
    <!-- section one end -->
    <!-- Bootstrap JS for interactive components -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
